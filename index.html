<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe Game</h1>
    <p class="subtitle">Converted from C program to a web-deployable version</p>

    <div id="status">Player X's turn</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <button id="resetBtn">Restart Game</button>

    <div class="note">
      <h3>Original C Logic Used</h3>
      <p>
        This web version follows the same logic as your C program:
        initialize board, place player move, check rows, columns, and diagonals,
        then declare the winner.
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
